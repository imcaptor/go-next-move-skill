# Project defaults for using KataGo as a next-move advisor.
# Load after KataGo's bundled gtp_example.cfg so these values override it.

rules = chinese

maxVisits = 400
numSearchThreads = 8
ponderingEnabled = false

logDir = katago_logs
logAllGTPCommunication = false
logSearchInfo = false
logSearchInfoForChosenMove = false
logToStderr = true
