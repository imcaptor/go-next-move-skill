# Project defaults for using KataGo's JSON analysis engine.
# Load after KataGo's bundled analysis_example.cfg so these values override it.

logDir = katago_analysis_logs
logToStderr = false
logAllRequests = false
logAllResponses = false
logErrorsAndWarnings = true

maxVisits = 400
numAnalysisThreads = 1
numSearchThreadsPerAnalysisThread = 8
analysisPVLen = 8
reportAnalysisWinratesAs = SIDETOMOVE
